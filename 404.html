<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Alamat Armada Seriang Sudah Berubah</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --card: rgba(255,255,255,.96);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: rgba(148,163,184,.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.38), transparent 34%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 34px 28px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(2,6,23,.32);
    }
    .badge {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2563eb, #16a34a);
      color: #fff;
      font-weight: 800;
      font-size: 26px;
      margin-bottom: 18px;
      box-shadow: 0 14px 36px rgba(37,99,235,.28);
    }
    h1 {
      font-size: clamp(24px, 5vw, 34px);
      line-height: 1.16;
      margin: 0 0 12px;
      letter-spacing: -.02em;
    }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 auto 24px;
      max-width: 460px;
    }
    .new-url {
      display: inline-block;
      font-size: 15px;
      color: #1e40af;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 330px);
      min-height: 54px;
      padding: 14px 20px;
      border-radius: 16px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 14px 32px rgba(37,99,235,.28);
      transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .footer {
      margin-top: 22px;
      font-size: 13px;
      color: #94a3b8;
    }
    @media (max-width: 420px) {
      body { padding: 16px; }
      .card { border-radius: 22px; padding: 28px 20px; }
      .badge { width: 66px; height: 66px; border-radius: 20px; font-size: 23px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <div class="badge" aria-hidden="true">SNTZ</div>
    <h1 id="title">Alamat Armada Seriang Sudah Berubah</h1>
    <p>
      Aplikasi Armada Seriang sudah menggunakan alamat web resmi yang baru.
      Silakan gunakan tombol di bawah ini untuk masuk ke aplikasi.
    </p>
    <div class="new-url">https://sntz.my.id/armada</div>
    <a class="btn" href="https://sntz.my.id/armada" rel="noopener">Masuk ke Armada Seriang</a>
    <div class="footer">Seriang Training Center</div>
  </main>
</body>
</html>
